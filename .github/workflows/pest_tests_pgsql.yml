name: Pest Tests (PostgreSQL)

on: [push, pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pest-pgsql:
    runs-on: ubuntu-24.04
    name: Pest Tests (PostgreSQL)
    continue-on-error: true

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: unopim
          POSTGRES_PASSWORD: unopim
          POSTGRES_DB: unopim
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U unopim"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=3
          --tmpfs /var/lib/postgresql/data:rw,noexec,nosuid,size=600m

    steps:
      - name: Checkout DAM
        uses: actions/checkout@v5
        with:
          path: dam-package

      - name: Checkout UnoPim
        uses: actions/checkout@v5
        with:
          repository: unopim/unopim
          path: unopim

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: curl, fileinfo, gd, intl, mbstring, openssl, pdo, pdo_pgsql, tokenizer, zip
          ini-values: error_reporting=E_ALL
          tools: composer:v2
          coverage: none

      - name: Symlink DAM into UnoPim packages
        run: |
          mkdir -p unopim/packages/Webkul/DAM
          cp -r dam-package/src unopim/packages/Webkul/DAM/src
          cp -r dam-package/tests unopim/packages/Webkul/DAM/tests
          cp dam-package/composer.json unopim/packages/Webkul/DAM/composer.json

      - name: Patch composer.json for DAM
        working-directory: unopim
        run: |
          php -r "
            \$json = json_decode(file_get_contents('composer.json'), true);
            \$json['repositories'][] = ['type' => 'path', 'url' => 'packages/Webkul/DAM'];
            \$json['require']['unopim/dam'] = '*@dev';
            file_put_contents('composer.json', json_encode(\$json, JSON_PRETTY_PRINT | JSON_UNESCAPED_SLASHES));
          "

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: |
            unopim/vendor
            ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-dam-pgsql-${{ hashFiles('unopim/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-dam-pgsql-

      - name: Install dependencies
        working-directory: unopim
        run: composer update --no-interaction --prefer-dist --optimize-autoloader --no-progress

      - name: Add DAM test suite to phpunit.xml
        working-directory: unopim
        run: |
          sed -i '/<\/testsuites>/i\
              <testsuite name="DAM Feature Test">\
                  <directory suffix="Test.php">packages/Webkul/DAM/tests/Feature</directory>\
              </testsuite>' phpunit.xml

      - name: Register DAM test case in Pest.php
        working-directory: unopim
        run: |
          sed -i '/^use Webkul\\Category\\Tests\\CategoryTestCase;/a use Webkul\\DAM\\Tests\\DamTestCase;' tests/Pest.php
          sed -i '/^uses(CategoryTestCase::class)/a uses(DamTestCase::class)->in('\''../packages/Webkul/DAM/tests'\'');' tests/Pest.php

      - name: Setting Environment
        working-directory: unopim
        run: |
          cp .env.example .env
          sed -i "s|^\(APP_ENV=\s*\).*$|\1testing|" .env
          sed -i "s|^\(DB_CONNECTION=\s*\).*$|\1pgsql|" .env
          sed -i "s|^\(DB_HOST=\s*\).*$|\1127.0.0.1|" .env
          sed -i "s|^\(DB_PORT=\s*\).*$|\15432|" .env
          sed -i "s|^\(DB_DATABASE=\s*\).*$|\1unopim|" .env
          sed -i "s|^\(DB_USERNAME=\s*\).*$|\1unopim|" .env
          sed -i "s|^\(DB_PASSWORD=\s*\).*$|\1unopim|" .env

      - name: Running UnoPim Installer
        working-directory: unopim
        run: php artisan unopim:install --skip-env-check --skip-admin-creation --with-demo-data

      - name: Running DAM Installer
        working-directory: unopim
        run: php artisan dam-package:install --no-interaction

      - name: Running Pest Tests
        working-directory: unopim
        run: vendor/bin/pest --colors=always

  pest-pgsql-elasticsearch:
    runs-on: ubuntu-24.04
    name: Pest Tests (PostgreSQL + Elasticsearch)
    continue-on-error: true

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: unopim
          POSTGRES_PASSWORD: unopim
          POSTGRES_DB: unopim
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U unopim"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=3
          --tmpfs /var/lib/postgresql/data:rw,noexec,nosuid,size=600m

      elasticsearch:
        image: elasticsearch:8.17.0
        env:
          discovery.type: single-node
          xpack.security.enabled: 'false'
          ES_JAVA_OPTS: '-Xms256m -Xmx256m'
        ports:
          - 9200:9200
        options: >-
          --health-cmd="curl -s http://localhost:9200/_cluster/health || exit 1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout DAM
        uses: actions/checkout@v5
        with:
          path: dam-package

      - name: Checkout UnoPim
        uses: actions/checkout@v5
        with:
          repository: unopim/unopim
          path: unopim

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: curl, fileinfo, gd, intl, mbstring, openssl, pdo, pdo_pgsql, tokenizer, zip
          ini-values: error_reporting=E_ALL
          tools: composer:v2
          coverage: none

      - name: Symlink DAM into UnoPim packages
        run: |
          mkdir -p unopim/packages/Webkul/DAM
          cp -r dam-package/src unopim/packages/Webkul/DAM/src
          cp -r dam-package/tests unopim/packages/Webkul/DAM/tests
          cp dam-package/composer.json unopim/packages/Webkul/DAM/composer.json

      - name: Patch composer.json for DAM
        working-directory: unopim
        run: |
          php -r "
            \$json = json_decode(file_get_contents('composer.json'), true);
            \$json['repositories'][] = ['type' => 'path', 'url' => 'packages/Webkul/DAM'];
            \$json['require']['unopim/dam'] = '*@dev';
            file_put_contents('composer.json', json_encode(\$json, JSON_PRETTY_PRINT | JSON_UNESCAPED_SLASHES));
          "

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: |
            unopim/vendor
            ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-dam-pgsql-${{ hashFiles('unopim/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-dam-pgsql-

      - name: Install dependencies
        working-directory: unopim
        run: composer update --no-interaction --prefer-dist --optimize-autoloader --no-progress

      - name: Add DAM test suite to phpunit.xml
        working-directory: unopim
        run: |
          sed -i '/<\/testsuites>/i\
              <testsuite name="DAM Feature Test">\
                  <directory suffix="Test.php">packages/Webkul/DAM/tests/Feature</directory>\
              </testsuite>' phpunit.xml

      - name: Register DAM test case in Pest.php
        working-directory: unopim
        run: |
          sed -i '/^use Webkul\\Category\\Tests\\CategoryTestCase;/a use Webkul\\DAM\\Tests\\DamTestCase;' tests/Pest.php
          sed -i '/^uses(CategoryTestCase::class)/a uses(DamTestCase::class)->in('\''../packages/Webkul/DAM/tests'\'');' tests/Pest.php

      - name: Setting Environment
        working-directory: unopim
        run: |
          cp .env.example .env
          sed -i "s|^\(APP_ENV=\s*\).*$|\1testing|" .env
          sed -i "s|^\(DB_CONNECTION=\s*\).*$|\1pgsql|" .env
          sed -i "s|^\(DB_HOST=\s*\).*$|\1127.0.0.1|" .env
          sed -i "s|^\(DB_PORT=\s*\).*$|\15432|" .env
          sed -i "s|^\(DB_DATABASE=\s*\).*$|\1unopim|" .env
          sed -i "s|^\(DB_USERNAME=\s*\).*$|\1unopim|" .env
          sed -i "s|^\(DB_PASSWORD=\s*\).*$|\1unopim|" .env

      - name: Running UnoPim Installer
        working-directory: unopim
        run: php artisan unopim:install --skip-env-check --skip-admin-creation --with-demo-data

      - name: Running DAM Installer
        working-directory: unopim
        run: php artisan dam-package:install --no-interaction

      - name: Enable Elasticsearch and build indexes
        working-directory: unopim
        run: |
          sed -i "s|^\(ELASTICSEARCH_ENABLED=\s*\).*$|\1true|" .env
          sed -i "s|^\(ELASTICSEARCH_HOST=\s*\).*$|\1http://127.0.0.1:9200|" .env
          sed -i "s|^\(ELASTICSEARCH_INDEX_PREFIX=\s*\).*$|\1unopim_test|" .env
          php artisan config:clear
          curl -s http://127.0.0.1:9200/_cluster/health | python3 -m json.tool
          php artisan unopim:product:index
          php artisan unopim:category:index

      - name: Running Pest Tests
        working-directory: unopim
        run: vendor/bin/pest --colors=always
