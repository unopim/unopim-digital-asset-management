name: Playwright Tests
on: [push, pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_COLOR: 1

jobs:
  playwright_tests:
    name: Playwright E2E | Shard ${{ matrix.shard-index }}/${{ matrix.shard-total }}
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        shard-index: [1, 2, 3, 4, 5, 6, 7, 8]
        shard-total: [8]

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: unopim
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=3
          --tmpfs /var/lib/mysql:rw,noexec,nosuid,size=600m
          --tmpfs /tmp:rw,noexec,nosuid,size=100m

    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      GROQ_INVALID_KEY: ${{ secrets.GROQ_INVALID_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      UNOPIM_URL: ${{ secrets.UNOPIM_URL }}
      ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      INVALID_ADMIN_EMAIL: ${{ secrets.INVALID_ADMIN_EMAIL }}
      INVALID_ADMIN_PASSWORD: ${{ secrets.INVALID_ADMIN_PASSWORD }}

    steps:
      - name: Checkout DAM
        uses: actions/checkout@v5
        with:
          path: dam-package

      - name: Checkout UnoPim
        uses: actions/checkout@v5
        with:
          repository: unopim/unopim
          ref: 5b74a5ede24862d5f60fae1a7521de99e86cddfa
          path: unopim

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: curl, fileinfo, gd, intl, mbstring, openssl, pdo, pdo_mysql, tokenizer, zip
          ini-values: error_reporting=E_ALL
          tools: composer:v2
          coverage: none

      - name: Copy DAM into UnoPim packages
        run: |
          mkdir -p unopim/packages/Webkul/DAM
          cp -r dam-package/src unopim/packages/Webkul/DAM/src
          cp dam-package/composer.json unopim/packages/Webkul/DAM/composer.json
          if [ -d dam-package/publishable ]; then
            cp -r dam-package/publishable unopim/packages/Webkul/DAM/publishable
          fi
          cp dam-package/package.json unopim/packages/Webkul/DAM/package.json
          cp dam-package/vite.config.js unopim/packages/Webkul/DAM/vite.config.js
          rsync -a \
            --exclude 'node_modules' \
            --exclude 'playwright-report' \
            --exclude 'test-results' \
            --exclude '.state' \
            dam-package/tests/ unopim/packages/Webkul/DAM/tests/

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: |
            unopim/vendor
            ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-dam-${{ hashFiles('unopim/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-dam-

      - name: Cache UnoPim e2e npm dependencies
        uses: actions/cache@v5
        with:
          path: unopim/tests/e2e-pw/node_modules
          key: ${{ runner.os }}-npm-unopim-${{ hashFiles('unopim/tests/e2e-pw/package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-unopim-

      - name: Cache DAM e2e npm dependencies
        uses: actions/cache@v5
        with:
          path: unopim/packages/Webkul/DAM/tests/e2e-pw/node_modules
          key: ${{ runner.os }}-npm-dam-${{ hashFiles('dam-package/tests/e2e-pw/package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-dam-

      - name: Cache DAM API npm dependencies
        if: matrix.shard-index == 1
        uses: actions/cache@v5
        with:
          path: unopim/packages/Webkul/DAM/tests/api-pw/node_modules
          key: ${{ runner.os }}-npm-dam-api-${{ hashFiles('dam-package/tests/api-pw/package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-dam-api-

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('unopim/tests/e2e-pw/package-lock.json', 'dam-package/tests/e2e-pw/package-lock.json') }}
          restore-keys: ${{ runner.os }}-playwright-

      - name: Install npm & Playwright browsers (UnoPim suite)
        run: |
          cd unopim/tests/e2e-pw
          npm install --no-progress --prefer-offline
          npx playwright install --with-deps chromium

      - name: Install npm & Playwright browsers (DAM suite)
        run: |
          cd unopim/packages/Webkul/DAM/tests/e2e-pw
          npm install --no-progress --prefer-offline
          npx playwright install --with-deps chromium

      - name: Install npm (DAM API suite)
        if: matrix.shard-index == 1
        run: |
          cd unopim/packages/Webkul/DAM/tests/api-pw
          npm install --no-progress --prefer-offline

      - name: Install Composer dependencies
        working-directory: unopim
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-progress

      - name: Register DAM as a path repository and require it
        working-directory: unopim
        run: |
          composer config repositories.dam '{"type":"path","url":"packages/Webkul/DAM","options":{"symlink":true}}' --json
          composer require unopim/dam:"*@dev" --no-interaction --no-progress --prefer-dist

      - name: Setting Environment
        working-directory: unopim
        run: |
          cp .env.example .env
          sed -i "s|^\(APP_ENV=\s*\).*$|\1testing|" .env
          sed -i "s|^\(APP_DEBUG=\s*\).*$|\1false|" .env
          sed -i "s|^\(APP_URL=\s*\).*$|\1http://127.0.0.1:8000|" .env
          sed -i "s|^\(DB_HOST=\s*\).*$|\1127.0.0.1|" .env
          sed -i "s|^\(DB_PORT=\s*\).*$|\13306|" .env
          sed -i "s|^\(DB_DATABASE=\s*\).*$|\1unopim|" .env
          sed -i "s|^\(DB_USERNAME=\s*\).*$|\1root|" .env
          sed -i "s|^\(DB_PASSWORD=\s*\).*$|\1root|" .env

      - name: Running UnoPim Installer & Start Server
        working-directory: unopim
        run: |
          php artisan unopim:install --skip-env-check --skip-admin-creation --with-demo-data
          php artisan dam-package:install --no-interaction
          npm install --no-progress
          npm run build
          php artisan serve --host=0.0.0.0 --port=8000 > /tmp/server.log 2>&1 &
          php artisan queue:work --queue=default,system,completeness > /tmp/queue.log 2>&1 &
          echo "Waiting for server..."
          timeout 30 bash -c 'until curl -s http://127.0.0.1:8000 > /dev/null; do sleep 1; done' || (cat /tmp/server.log && exit 1)

      - name: Run UnoPim Playwright tests
        id: unopim_pw
        run: |
          cd unopim/tests/e2e-pw
          npx playwright test --reporter=list,html --shard=${{ matrix.shard-index }}/${{ matrix.shard-total }}

      - name: Clear login rate limiter before DAM suite
        if: always() && steps.unopim_pw.conclusion != 'skipped'
        working-directory: unopim
        run: php artisan optimize:clear

      - name: Run DAM Playwright tests
        id: dam_pw
        if: always() && steps.unopim_pw.conclusion != 'skipped'
        run: |
          cd unopim/packages/Webkul/DAM/tests/e2e-pw
          npx playwright test --reporter=list,html --shard=${{ matrix.shard-index }}/${{ matrix.shard-total }}

      - name: Stop background queue worker before the DAM API suite
        if: always() && matrix.shard-index == 1 && steps.unopim_pw.conclusion != 'skipped'
        run: |
          # Directory deletes run in the DeleteDirectory queue job, which mutates
          # the nested-set tree (_lft/_rgt). If the worker processes those jobs
          # while the API suite is creating folders, the concurrent tree
          # rewrites corrupt the lineage and folder creates 500 with a stale
          # "not writable" path. The API suite needs no async jobs (asset delete
          # is synchronous; the directory-delete test only asserts the 202
          # enqueue), so stop the worker to keep folder operations race-free.
          pkill -f 'artisan queue:work' || true

      - name: Provision Passport client & mint token for the DAM API suite
        id: make_passport_client
        if: always() && matrix.shard-index == 1 && steps.unopim_pw.conclusion != 'skipped'
        working-directory: unopim
        env:
          BASE_URL: http://127.0.0.1:8000
        run: |
          # Provision the password-grant client(s) HERE — right before the API
          # suite — so the e2e suites can't disturb them. We export the client
          # id/secret (not a pre-minted API_TOKEN) so the suite's global-setup
          # mints its own token once AND the OAuth password-grant lifecycle tests
          # in 01 actually run instead of skipping.
          #
          # UnoPim overrides Passport's ClientRepository::find() so that, for a
          # password-grant request, the client must be OWNED by the admin whose
          # email matches the request's `username` (client.user_id -> admins).
          # So the client has to be created with the admin's id as user_id, or
          # token minting fails with invalid_client.
          php artisan passport:keys --force --no-interaction
          php artisan tinker --execute='
          $provider = config("auth.guards.api.provider") ?: "admins";
          $email = getenv("ADMIN_USERNAME");
          $admin = app(Webkul\User\Repositories\AdminRepository::class)->findByField("email", $email)->first();
          if (! $admin) { fwrite(STDERR, "No admin user found for " . $email . PHP_EOL); exit(1); }
          $client = app(Laravel\Passport\ClientRepository::class)
              ->createPasswordGrantClient($admin->id, "DAM API Tests", "http://localhost", $provider);
          app(Webkul\AdminApi\Repositories\ApiKeyRepository::class)->create([
              "name"            => "DAM API Tests",
              "admin_id"        => $admin->id,
              "oauth_client_id" => $client->getKey(),
              "permission_type" => "all",
          ]);
          file_put_contents("/tmp/pp.env",
              "CLIENT_ID=" . $client->getKey() . PHP_EOL .
              "CLIENT_SECRET=" . ($client->plainSecret ?? $client->secret) . PHP_EOL);
          fwrite(STDERR, "Created DAM API password client " . $client->getKey() . " for admin #" . $admin->id . " (provider: " . $provider . ")" . PHP_EOL);
          fwrite(STDERR, "Created api_keys row (permission_type=all) for admin #" . $admin->id . PHP_EOL);

          $scopedEmail = "dam-scoped@example.com";
          $scopedPassword = "scoped123";
          $role = app(Webkul\User\Repositories\RoleRepository::class)->create([
              "name"            => "DAM Scoped " . uniqid(),
              "description"     => "Custom role, no directory grants, for API ACL tests",
              "permission_type" => "custom",
              "permissions"     => [],
          ]);
          $scoped = app(Webkul\User\Repositories\AdminRepository::class)->create([
              "name"         => "DAM Scoped",
              "email"        => $scopedEmail,
              "password"     => bcrypt($scopedPassword),
              "role_id"      => $role->id,
              "status"       => 1,
              "ui_locale_id" => $admin->ui_locale_id,
          ]);
          $scopedClient = app(Laravel\Passport\ClientRepository::class)
              ->createPasswordGrantClient($scoped->id, "DAM Scoped API", "http://localhost", $provider);
          app(Webkul\AdminApi\Repositories\ApiKeyRepository::class)->create([
              "name"            => "DAM Scoped API",
              "admin_id"        => $scoped->id,
              "oauth_client_id" => $scopedClient->getKey(),
              "permission_type" => "all",
          ]);
          $root = Webkul\DAM\Models\Directory::find(1);
          $deniedDir = new Webkul\DAM\Models\Directory(["name" => "Denied " . uniqid()]);
          $deniedDir->appendToNode($root)->save();
          $deniedAsset = Webkul\DAM\Models\Asset::create([
              "file_name" => "denied-" . uniqid() . ".png",
              "file_type" => "image",
              "file_size" => 1,
              "mime_type" => "image/png",
              "extension" => "png",
              "path"      => "assets/Root/denied.png",
          ]);
          $deniedAsset->directories()->attach($deniedDir->id);

          $knownTag = Webkul\DAM\Models\Tag::create(["name" => "api-known-tag-" . uniqid()]);
          $mapping = Webkul\DAM\Models\AssetResourceMapping::create([
              "type"          => "product",
              "related_field" => "images",
              "dam_asset_id"  => $deniedAsset->id,
          ]);

          file_put_contents("/tmp/pp.env",
              "SCOPED_CLIENT_ID=" . $scopedClient->getKey() . PHP_EOL .
              "SCOPED_CLIENT_SECRET=" . ($scopedClient->plainSecret ?? $scopedClient->secret) . PHP_EOL .
              "SCOPED_USERNAME=" . $scopedEmail . PHP_EOL .
              "SCOPED_PASSWORD=" . $scopedPassword . PHP_EOL .
              "DENIED_DIR_ID=" . $deniedDir->id . PHP_EOL .
              "DENIED_ASSET_ID=" . $deniedAsset->id . PHP_EOL .
              "TAG_ID=" . $knownTag->id . PHP_EOL .
              "LINKED_RESOURCE_ID=" . $mapping->id . PHP_EOL,
              FILE_APPEND);
          fwrite(STDERR, "Created scoped admin #" . $scoped->id . ", denied dir #" . $deniedDir->id . ", denied asset #" . $deniedAsset->id . ", tag #" . $knownTag->id . ", mapping #" . $mapping->id . PHP_EOL);
          '
          . /tmp/pp.env
          # Mint a token now; fail loudly with the real response if the password
          # grant rejects the client or the admin credentials.
          TOKEN_JSON=$(curl -sS -X POST "${BASE_URL}/oauth/token" \
            -H "Accept: application/json" \
            --data-urlencode "grant_type=password" \
            --data-urlencode "client_id=${CLIENT_ID}" \
            --data-urlencode "client_secret=${CLIENT_SECRET}" \
            --data-urlencode "username=${ADMIN_USERNAME}" \
            --data-urlencode "password=${ADMIN_PASSWORD}" \
            --data-urlencode "scope=*")
          ACCESS_TOKEN=$(printf '%s' "$TOKEN_JSON" | php -r '$d=json_decode(stream_get_contents(STDIN), true); echo $d["access_token"] ?? "";')
          if [ -z "$ACCESS_TOKEN" ]; then
            echo "Failed to mint OAuth token for the DAM API suite."
            echo "Response: $TOKEN_JSON"
            exit 1
          fi
          echo "Minted DAM API access token (client_id=${CLIENT_ID})."
          # Mint the scoped (custom-role) token used by the directory-ACL 403 tests.
          SCOPED_JSON=$(curl -sS -X POST "${BASE_URL}/oauth/token" \
            -H "Accept: application/json" \
            --data-urlencode "grant_type=password" \
            --data-urlencode "client_id=${SCOPED_CLIENT_ID}" \
            --data-urlencode "client_secret=${SCOPED_CLIENT_SECRET}" \
            --data-urlencode "username=${SCOPED_USERNAME}" \
            --data-urlencode "password=${SCOPED_PASSWORD}" \
            --data-urlencode "scope=*")
          SCOPED_TOKEN=$(printf '%s' "$SCOPED_JSON" | php -r '$d=json_decode(stream_get_contents(STDIN), true); echo $d["access_token"] ?? "";')
          if [ -z "$SCOPED_TOKEN" ]; then
            echo "Failed to mint scoped OAuth token for the DAM API permission tests."
            echo "Response: $SCOPED_JSON"
            exit 1
          fi
          echo "Minted scoped DAM API access token (client_id=${SCOPED_CLIENT_ID})."
          # Export client creds (suite mints its own token + runs the lifecycle
          # tests) plus the scoped token and denied ids for the 403 tests. No
          # API_TOKEN is exported on purpose.
          {
            echo "OAUTH_CLIENT_ID=${CLIENT_ID}"
            echo "OAUTH_CLIENT_SECRET=${CLIENT_SECRET}"
            echo "SCOPED_API_TOKEN=${SCOPED_TOKEN}"
            echo "DENIED_DIR_ID=${DENIED_DIR_ID}"
            echo "DENIED_ASSET_ID=${DENIED_ASSET_ID}"
            echo "TAG_ID=${TAG_ID}"
            echo "LINKED_RESOURCE_ID=${LINKED_RESOURCE_ID}"
          } >> "$GITHUB_ENV"

      - name: Run DAM API Playwright tests
        id: dam_api_pw
        if: always() && matrix.shard-index == 1 && steps.make_passport_client.outcome == 'success'
        working-directory: unopim/packages/Webkul/DAM/tests/api-pw
        env:
          BASE_URL: http://127.0.0.1:8000
          OAUTH_TOKEN_URL: /oauth/token
          API_LOCALE: en_US
        run: npx playwright test

      - name: Dump laravel.log on DAM API suite failure
        if: always() && matrix.shard-index == 1 && steps.dam_api_pw.outcome == 'failure'
        working-directory: unopim
        run: |
          echo "================ tail of storage/logs/laravel.log ================"
          tail -n 400 storage/logs/laravel.log || echo "no laravel.log found"

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report-shard-${{ matrix.shard-index }}-${{ github.run_id }}
          path: |
            unopim/tests/e2e-pw/playwright-report
            unopim/tests/e2e-pw/test-results
            unopim/packages/Webkul/DAM/tests/e2e-pw/playwright-report
            unopim/packages/Webkul/DAM/tests/e2e-pw/test-results
            unopim/packages/Webkul/DAM/tests/api-pw/playwright-report
            unopim/packages/Webkul/DAM/tests/api-pw/test-results
            unopim/storage/logs/laravel.log
            /tmp/server.log
            /tmp/queue.log
          retention-days: 1
